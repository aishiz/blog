    5. **НЕ додумывай контекст** — если что-то не сказано явно, НЕ предполагай
    6. **НЕ придумывай сравнения** — "лучше чем X" — ТОЛЬКО если это есть в источнике
    7. **НЕ придумывай даты** — "вчера", "на прошлой неделе" — ТОЛЬКО из источника
    8. **НЕ ПУТАЙ КОМПАНИИ!** — internlm ≠ DeepSeek ≠ OpenAI ≠ Anthropic — бери ТОЧНОЕ название из источника!
    9. **НЕ СМЕШИВАЙ ПОСТЫ!** — каждый источник обрабатывается ОТДЕЛЬНО!

    ### 🔗 ОСОБЕННО ПРО ССЫЛКИ:

    **НИКОГДА не придумывай URL!** Каждая выдуманная ссылка — это 404 для читателя.

