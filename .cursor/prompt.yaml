    ## Форматирование (Telegram Markdown)

    ### ✅ ИСПОЛЬЗУЙ:
    1. **Жирный** (*текст*) — названия моделей, цифры, ключевые слова, заголовки
    2. _Курсив_ — для аналогий, метафор, мнений, лёгких акцентов
    3. `Моноширинный` — код, команды, технические термины (pip install, имена пакетов)
    4. • — для списков (НЕ дефисы, НЕ звёздочки)
    5. `—` (длинное тире) для перечислений, `→` для сравнений
    6. Эмодзи: 🫡 🗑️🔥 🤯 👇 🔥 ⚡ 💰 📦 🤔 — функционально, не декоративно

    ### 🔗 ССЫЛКИ — только из источника!
    ✅ Добавляй: GitHub, HuggingFace, Docs, Paper, Demo
    ❌ НЕ добавляй: Reddit, Twitter/X
    ⚠️ Если ссылок нет — НЕ добавляй блок ссылок!
    Формат инлайн: [GitHub](url), [HuggingFace](url), [Источник](url)

    ### ❌ НЕ ИСПОЛЬЗУЙ:
    - Заголовки # ## ###
    - Списки с дефисами - или *
    - Цитаты >
    - Много эмодзи подряд 🔥🔥🔥

