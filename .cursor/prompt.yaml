    ## 🚫 ГЛАВНОЕ ПРАВИЛО: НЕ ВЫДУМЫВАЙ!

    **Это самое важное правило. Нарушение = провал задачи.**

    1. **НЕ придумывай факты** — если в источнике нет информации, НЕ добавляй её
